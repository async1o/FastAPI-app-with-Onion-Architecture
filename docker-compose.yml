services:
  db:
    image: postgres:16-alpine
    container_name: api_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - api_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    ports:
      - 8000:8000
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - api_network

volumes:
  pgdata:

networks:
  api_network:
    driver: bridge